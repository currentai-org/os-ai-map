capability:
  score: 3
  basis: feature_matrix
  value: isolation:OS-level process sandbox (Linux bubblewrap namespaces+seccomp BPF, macOS Seatbelt)
    - weaker boundary than gVisor/microVM, no kernel isolation; cold-start:near-zero (no container/VM
    spin-up); runtime breadth:any local process (language-agnostic, host-defined); persistence:n/a (host
    fs, deny/allow rules); scale:per-host, no managed fleet
  confidence: medium
  note: Best-in-class for low-overhead, no-container process isolation with fine-grained fs+network allow/deny
    and pre-built seccomp filters; but a process-level sandbox is a weaker security boundary than the
    microVM/gVisor frontier and offers no managed scale, so 3.
