description: All-in-one desktop and Docker app for private, on-device chat with documents (RAG), agents,
  and 30+ LLM providers including local Ollama. Differentiator is zero-config desktop setup with bundled
  embedder and vector DB, plus team/Docker mode with RBAC and embeddable widgets; ~60k GitHub stars.
