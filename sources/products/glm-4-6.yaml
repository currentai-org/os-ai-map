slug: glm-4-6
name: GLM-4.6
org: zhipu-ai
type: model
description: Zhipu AI's current frontier model, released September 30, 2025 — a 355B-parameter MoE with
  MIT-licensed open weights, a 200K context window, and published CC-Bench evaluation trajectories on
  Hugging Face for independent verification. Builds on GLM-4.5 (July 2025) and represents Zhipu's pivot
  to a fully open-weights frontier strategy. Z.ai (Zhipu's international brand) has also debuted GLM-4.6V,
  a native tool-calling vision variant. Deployable locally via vLLM or SGLang. Marks a sharp contrast
  with the prior closed-source GLM-4 positioning and one of the cleanest signals that Chinese frontier
  models have moved decisively open in 2025-2026.
version_note: 'GLM-4.6 (zai-org/GLM-4.6 on HF) by Z.ai (Zhipu AI), GLM4_MoE ~357B-param MoE, 200K context
  (up from 128K in GLM-4.5), instruction/chat + reasoning + agentic tool-use tuned. Released late 2025
  (post-GLM-4.5 which has arXiv 2508.06471). Verified live on HF June 2026 (succeeded by GLM-5/GLM-5.1,
  the latter a flagship anchor). Recategorized from base_pretrained -> finetuned_chat per pilot litmus:
  GLM-4.6 is an instruct/agentic chat SKU, not a raw base model.'
