name: math
display_name: MATH
org: hendrycks-et-al-uc-berkeley
type: dataset
description: A 12,500-problem benchmark of competition-style mathematics questions spanning algebra, counting,
  geometry, number theory, prealgebra, precalculus, and more. It is the standard hard math benchmark for
  measuring reasoning depth beyond GSM8K.
version_note: 'MATH (Hendrycks et al., NeurIPS 2021, arXiv 2103.03874): 12,500 competition math problems
  (7,500 train / 5,000 test) with step-by-step LaTeX solutions, Level 1-5, 7 subjects. Original HF dataset
  (hendrycks/competition_math) verified June 2026 but ACCESS DISABLED via DMCA takedown — no longer redistributable
  from the canonical registry; license tag is MIT.'
