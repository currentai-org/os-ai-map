name: hermes-4-3-36b
display_name: Hermes-4.3-36B
type: model
description: Hybrid-mode reasoning model built on ByteDance Seed-OSS-36B-Base. Nous frames it as roughly
  matching Hermes-4-70B performance at half the size; the public Hugging Face checkpoint has 6.4K cumulative
  downloads and 209 likes, making it the current flagship 36B release.
huggingface_model:
- url: https://huggingface.co/NousResearch/Hermes-4.3-36B
comments: Hybrid-mode reasoning instruct model by Nous Research; post-trained on ByteDance Seed-OSS-36B-Base.
  ~5M post-training samples / ~60B tokens (SFT + reasoning-trace synthesis). Updated Dec 6 2025; verified
  live on HF June 2026. License Apache-2.0; post-training data NOT released.
