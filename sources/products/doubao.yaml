description: 'ByteDance''s consumer AI chat app (doubao.com plus iOS/Android) powered by the Doubao Seed
  model family, with native multimodal support (text, image, audio, video) and a full-duplex real-time
  voice mode that streams ASR, reasoning, and TTS concurrently for natural barge-in conversation. The
  largest Chinese consumer AI chat product by daily usage: ~100M DAU baseline with a peak of ~145M DAU
  during the February 2026 Lunar New Year, ~345M MAU per QuestMobile Q1 2026 (other trackers put it at
  220-226M MAU around the same period). Served 1.9B+ queries as the exclusive AI partner of the 2026 CCTV
  Spring Festival Gala.'
version_note: 'ByteDance''s consumer AI assistant (chatbot app: iOS/Android/web), launched Aug 2023, running
  on Volcano Engine (Doubao models). Proprietary closed product. Introduced a paid Pro subscription tier
  ~May/Jun 2026. Verified live June 2026 (Wikipedia + China-market app trackers).'
