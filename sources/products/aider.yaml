slug: aider
name: Aider
org: aider-ai
type: software
description: Terminal-based AI pair programming tool that edits code directly in your local git repo.
  Differentiates through deep git integration (automatic commits with sensible messages), support for
  20+ LLM providers, and a sophisticated diff-based editing approach that minimizes token usage. 45K GitHub
  stars; widely regarded as the benchmark for CLI-based coding agents and the tool that pioneered the
  'agentic coding in terminal' pattern.
version_note: Aider v0.86.2 (PyPI aider-chat, Feb 12 2026); GitHub repo Aider-AI/aider active, 45.8k stars.
  Terminal AI pair-programming agent that plans edits across a repo and applies git commits. Confirmed
  live June 2026.
