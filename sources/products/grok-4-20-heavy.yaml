description: xAI's current flagship instruction-tuned product (Feb 2026), built as a 16-agent specialized
  system — multiple Grok-4 instances coordinated around specialized roles rather than a single monolithic
  call. Marketed as xAI's top reasoning + agentic tier; ships alongside Grok 4 and Grok 4.1 as the standard
  API tiers. Grok 5 is still in training (claimed 10T params; ~33% chance of release by 2026-06-30 per
  prediction markets).
version_note: xAI Grok 4.20 Heavy — the high-effort multi-agent tier of Grok 4.20 (beta Feb 17, 2026;
  multi-agent API GA Mar 9, 2026). 'Heavy' scales the default 4-agent debate (Grok/Harper/Benjamin/Lucas)
  to 16 specialized agents; 2M-token context. Accessed via SuperGrok Heavy ($300/mo). Distinct SKU from
  the 'Grok 4.20' flagship anchor (default-effort). Superseded by Grok 4.3 but still offered. Verified
  live June 2026.
