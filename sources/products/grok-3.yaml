comments: xAI Grok 3, released Feb 17, 2025; trained on the Colossus supercluster. Post-trained chat/assistant
  model (Grok 3 + Grok 3 Reasoning/mini variants). Superseded by Grok 4 / 4.1 / 4.20 / 4.3 but remains
  a foundational xAI assistant generation. Proprietary API-only / X-integrated. x.ai/news/grok-3 returned
