slug: sillytavern
name: SillyTavern
org: sillytavern
type: software
description: Self-hosted chat frontend originally forked from TavernAI, focused on character/roleplay
  use cases with deep support for prompt engineering, lorebooks, group chats, and any OpenAI-compatible
  or local backend. Dominant frontend in the open roleplay/character-chat community (~28k GitHub stars)
  and the de facto UI for users moving off Character.ai to local models.
version_note: SillyTavern v1.18.0 (released 3 May 2026). Self-hosted local chat front-end (NodeJS) for
  text-gen LLMs, originally a TavernAI fork (Feb 2023); connects to many backends (KoboldAI, OpenAI, Claude,
  Mistral, etc.) with character/roleplay focus, image-gen + TTS integration, extensions. Verified live
  on GitHub June 2026.
