description: Previous-generation general-purpose instruction-tuned MoE model (671B total / 37B active).
  Still widely used (4.2M+ monthly downloads) but superseded by DeepSeek-V4-Pro / V4-Flash (April 2026,
  1M default context, 384K max output). The legacy `deepseek-chat` and `deepseek-reasoner` aliases route
  to V4-Flash from 2026-07-24.
