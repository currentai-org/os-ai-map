name: llama-3-1-8b-instruct
display_name: Llama-3.1-8B-Instruct
type: model
description: Instruction-tuned 8B Llama 3.1 model for chat and assistant workflows, post-trained with
  SFT and DPO on Meta's Llama 3.1 base. The 128K context window and Llama Community License made it the
  default open instruct checkpoint for production chat deployments. Currently the most-downloaded Llama
  variant on Hugging Face at ~10.8M downloads/month, surpassing every other open chat checkpoint by an
  order of magnitude.
huggingface_model:
- url: https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct
comments: Llama 3.1 8B Instruct, released 23 Jul 2024. 8B dense, 128k context, SFT+RLHF post-trained chat
  model. Verified live on HF June 2026; one of the most-downloaded instruct models on the platform.
