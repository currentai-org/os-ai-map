description: xAI's consumer chat product with a standalone app (grok.com) plus deep integration into X
  (Twitter), competing on real-time data access and a less-filtered tone. ~64M MAU by early 2026 and ~17.8%
  US chatbot share — third behind ChatGPT and Gemini, with the fastest single-year share gain of any consumer
  chatbot.
version_note: Grok consumer AI chat assistant by xAI — the app/UI surface (grok.com + X integration +
  mobile), live June 2026 (x.ai). Scored here as the chat-UI product, NOT the Grok 4.x model SKU (the
  model is scored in base_pretrained as Grok 4.20). Proprietary; human-in-the-loop assistant with image
  gen + X-grounded search.
