slug: ifeval
name: IFEval
org: google
type: dataset
description: Instruction-Following Eval (IFEval) is a benchmark of 541 verifiable instructions used to
  measure how well models follow explicit constraints such as word-count limits, keyword inclusion, and
  format requirements. It is widely used for instruction-following and controllability evaluation.
version_note: IFEval (Instruction-Following Eval), 541 prompts with ~25 verifiable instruction types for
  programmatic (rule-based) scoring of LLM instruction-following. Paper arXiv:2311.07911. A core component
  of the HF Open LLM Leaderboard. HF dataset google/IFEval verified live June 2026.
