description: MiniMax's flagship instruction-tuned coding model, top-10 on SWE-bench Verified at 80.2%
  as of May 2026. Part of the wave of Chinese frontier-tier coding models (alongside DeepSeek V4, Kimi
  K2.6, Qwen3-Coder-Next, and GLM-4.6) closing the gap with Anthropic/Google/OpenAI on standard coding
  evals. Available via MiniMax's hosted API with multi-modal extensions.
version_note: MiniMax-M2.5 (MiniMaxAI), 229B total / 10B active MoE, agentic chat/instruct model RL-trained
  across 200K+ environments; released 12 Feb 2026. Open weights on HF (also ModelScope) under Modified-MIT.
  ~100 tok/s native; ~$0.30-$1.00/hour serving. Verified live on HF June 2026 (~693K downloads in the
  last month).
