name: gemma-3
display_name: Gemma 3
org: google-deepmind
type: model
description: Google's current open-weights model family, released March 12, 2025 — and the first open-weights
  Gemma generation with native vision-language capability. Available in 1B/4B/12B/27B variants (the 1B
  is text-only; the 4B/12B/27B are vision-language models), with a 128K context window on the larger variants
  and native multilingual support for 140+ languages. The Gemma 3 27B fits at Q4 on a single 3090 yet
  competes with much larger 400B-600B models on standard evals. Released under the Gemma license on Hugging
  Face and Kaggle. Google's primary contribution to the open-weights ecosystem in 2025-2026.
version_note: Gemma 3 family (1B, 4B, 12B, 27B), released 12 Mar 2025. 4B/12B/27B are vision-language;
  1B is text-only. Both pretrained and instruction-tuned weights released. (Successor Gemma 4 has since
  appeared but Gemma 3 is the scored product.)
