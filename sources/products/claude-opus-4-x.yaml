name: claude-opus-4-x
display_name: Claude Opus 4.x
type: model
description: Anthropic's heavy-reasoning Opus tier, tuned for sustained agentic coding and long-horizon
  planning across large codebases. Opus 4 scored 72.5% on SWE-bench Verified at release (May 2025 era);
  the line has iterated through Opus 4.5 (80.9%), Opus 4.6 (80.8%), and Opus 4.7 (April 2026), which hits
  87.6% SWE-bench Verified and 98.5% computer-use visual acuity. Opus 4.6 and 4.7 are tied at the top
  of LMArena (Elo ~1500). A leaked 'Claude Mythos Preview' tops SWE-bench at 93.9% and is presumed to
  be the next-generation Opus / Claude 5 candidate.
comments: 'Anthropic Claude Opus 4.x flagship line: Opus 4 (May 22 2025) -> 4.5 (Nov 2025) -> 4.6 (Feb
  2026) -> 4.7 (Apr 16 2026) -> 4.8 (May 28 2026, current frontier, model id claude-opus-4-8). Post-trained
  chat/agentic flagship, closed/API + Bedrock + Vertex + claude.ai. Note: Opus 4.7 is a frozen base_pretrained
  anchor; this record scores the Opus 4.x line in finetuned_chat. Verified via Anthropic Opus 4.8 + Claude
  4 pages June 2026.'
