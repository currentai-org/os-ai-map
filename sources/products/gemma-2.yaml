name: gemma-2
display_name: Gemma 2
type: model
description: Google's previous-generation open-weights model family (2B/9B/27B) derived from Gemini research,
  using knowledge distillation from larger models during training. Released July 2024 under the Gemma
  license; now superseded by Gemma 3 (March 2025) which added multimodal vision capability. Gemma 2 9B
  remains widely used as a community fine-tuning base, with ~1.5M monthly Hugging Face downloads on the
  base 9B variant.
huggingface_model:
- url: https://huggingface.co/google/gemma-2-27b
- url: https://huggingface.co/google/gemma-2-9b
comments: 'Gemma 2 family (9B, 27B), released 27 Jun 2024. Both pretrained (PT) and instruction-tuned
  (IT) weights released; scored on the 27B base (google/gemma-2-27b). 13T tokens (27B). VERIFIED live
  on HF June 2026: 27B base (PT), Gemma license, gated, 5,893 downloads/mo. Succeeded by Gemma 3.'
