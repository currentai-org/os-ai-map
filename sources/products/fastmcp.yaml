slug: fastmcp
name: FastMCP
org: prefect
type: software
description: High-level Python framework for building MCP servers and clients with minimal boilerplate.
  Provides decorator-based tool definitions, automatic schema generation, and built-in testing utilities.
  The fastest way to create a production MCP server — 25K GitHub stars and growing rapidly. Becoming the
  de facto framework for MCP server development in Python.
version_note: Pythonic framework for building MCP servers and clients (FastMCP 1.0 was upstreamed into
  the official MCP Python SDK in 2024; FastMCP 2.0/3.x is the standalone successor). Maintained by Prefect.
  Apache-2.0. v3.4.0 released 3 Jun 2026; verified live June 2026.
artifacts:
  repos:
  - PrefectHQ/fastmcp
  packages:
  - pypi/fastmcp
