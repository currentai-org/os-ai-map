name: microsoft-copilot
display_name: Microsoft Copilot
org: microsoft
type: software
description: Microsoft's consumer/enterprise Copilot chat surface on Windows, web, mobile, and embedded
  across Microsoft 365 (Word, Excel, Teams, Outlook). 15M paid M365 Copilot seats and 33M active users
  as of Q2 FY2026, though usage share has slipped vs ChatGPT and Gemini.
version_note: Microsoft Copilot consumer + M365 Copilot chat assistant surfaces (Windows, Edge, M365,
  Bing, mobile), live June 2026 per Microsoft Learn admin/usage docs. Proprietary chat UI over OpenAI
  + Microsoft models; human-in-the-loop assistant (Copilot Studio agents are a separate product). Scored
  as the chat-UI surface.
