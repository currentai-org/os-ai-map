name: deepseek-v3-base
display_name: DeepSeek-V3 Base
type: model
description: Legacy 671B-parameter mixture-of-experts model (37B active per token) trained on 14.8T tokens
  with FP8 mixed precision at a reported ~$5.5M training cost. Shifted the narrative on cost-efficient
  frontier model training when released in December 2024, and remained the open-weights reference point
  through most of 2025. Superseded by DeepSeek-V4-Base (April 2026); the hosted `deepseek-chat` and `deepseek-reasoner`
  aliases deprecate 2026-07-24, but V3 weights remain widely fine-tuned in the community.
github:
- url: https://github.com/deepseek-ai/DeepSeek-V3
huggingface_model:
- url: https://huggingface.co/deepseek-ai/DeepSeek-V3-Base
flags:
- near_open_source_non_osi_license
comments: 'DeepSeek-V3-Base, 671B total / 37B active MoE (685B incl MTP module), 128K context, trained
  on 14.8T tokens. Released 27 Dec 2024 (arXiv 2412.19437). Base/pretrained SKU. VERIFIED live on HF June
  2026: 671B/37B MoE base, MIT code + custom Model License, commercial use supported.'
