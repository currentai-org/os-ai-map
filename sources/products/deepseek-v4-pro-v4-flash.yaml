description: DeepSeek's open-weight April 2026 flagship line, replacing V3.2. Released 2026-04-24 with
  1M default context and 384K max output. V4-Pro-Max posts 80.6% on SWE-bench Verified (top-10) and a
  later snapshot reports 93.5% on LiveCodeBench. Available via the `deepseek-chat` (V4-Flash) and `deepseek-reasoner`
  aliases from 2026-07-24, with weights on Hugging Face under MIT. Demonstrates that open weights can
  match closed-API frontier coding performance at the same context window.
version_note: Compound SKU. DeepSeek-V4-Pro (1.6T total / 49B active MoE) is a FROZEN flagship anchor
  (base_pretrained shelf) - NOT rescored here; calibrate to it. This record scores the non-anchor sibling
  DeepSeek-V4-Flash (284B total / 13B active MoE, 1M context, FP4+FP8, hybrid CSA+HCA attention, mHC,
  Muon optimizer), the lighter instruct/thinking SKU of the V4 family. Verified live on HF June 2026.
