name: mistral-7b-instruct-v0-2
display_name: Mistral-7B-Instruct-v0.2
type: model
description: Instruction-tuned 7B chat model from Mistral that follows user prompts in a dialogue format.
  It was the first widely adopted European open instruct release (Dec 2023) and remains the canonical
  7B chat baseline in eval papers and fine-tuning tutorials. Still pulls ~3.2M Hugging Face downloads
  per month nearly 2.5 years after release.
huggingface_model:
- url: https://huggingface.co/mistralai/Mistral-7B-Instruct-v0.2
comments: Mistral 7B Instruct v0.2, 7B dense, 32k context (up from 8k in v0.1); instruct fine-tune of
  Mistral-7B-v0.2 (base paper arXiv:2310.06825, Oct 2023). >12 months old and superseded by v0.3 and the
  Ministral/Mistral Small lines, but foundational permissive instruct model; verified live on HF June
  2026.
