slug: deepseek-coder-v2-instruct
name: DeepSeek-Coder-V2-Instruct
org: deepseek
type: model
description: Dedicated coding MoE model (seed product) instruction-tuned for code generation, completion,
  and chat. Available in full (236B) and Lite (16B) variants. The Lite variant remains popular for local
  deployment with 1.1M+ downloads. Predecessor to the V3/R1 generation that proved open-source could compete
  on coding benchmarks.
version_note: DeepSeek-Coder-V2-Instruct (236B total / 21B active DeepSeekMoE, 128K context), instruction-tuned
  coder built on a DeepSeek-V2 checkpoint + 6T additional code tokens, 338 languages; arXiv 2401.06066.
  Verified live on HF June 2026; a dated (2024-gen) coder.
flags:
- mixed_tier_openness
- near_open_source_non_osi_license
artifacts:
