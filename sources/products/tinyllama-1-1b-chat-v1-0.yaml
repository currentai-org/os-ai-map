name: tinyllama-1-1b-chat-v1-0
display_name: TinyLlama-1.1B-Chat-v1.0
org: tinyllama
type: model
description: A 1.1B instruction-tuned chat model from the TinyLlama project, built on the Llama architecture
  and trained on 3T tokens for ~90 days on 16 A100-40G GPUs. It became the canonical sub-2B open chat
  baseline for edge and local-inference research and still pulls ~2.5M Hugging Face downloads per month
  two years after release.
version_note: 1.1B chat model (Llama 2 architecture), DPO-aligned finetune of TinyLlama-1.1B (pretrained
  on 3T tokens). Released 2023/early-2024; v1.0. License Apache-2.0. Verified live on HF June 2026 — foundational
  small-chat model still heavily pulled.
