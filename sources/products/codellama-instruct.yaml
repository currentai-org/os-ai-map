name: codellama-instruct
display_name: CodeLlama Instruct
org: meta
type: model
description: Code-specialized instruction-tuned Llama 2 family (7B to 70B, seed product) trained on 500B+
  tokens of code and fine-tuned for coding chat. Pioneered the open-source coding LLM wave in 2023 and
  catalyzed the entire open code model ecosystem. Still used as a baseline with ~104K combined monthly
  downloads across sizes.
version_note: Code Llama Instruct (instruct-tuned coding variant; 7B/13B/34B/70B; scored on the 13B-Instruct
  SKU as representative). Trained Jan-Jul 2023, paper arXiv:2308.12950 (Aug 2023). >12 months old and
  superseded by Llama 3.x/Codestral-class coders, but foundational open coding-instruct model; verified
  live on HF June 2026.
