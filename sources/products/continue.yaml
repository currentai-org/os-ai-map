slug: continue
name: Continue
org: continue
type: software
description: Open-source AI code assistant for VS Code and JetBrains IDEs offering inline completions,
  chat, and edit modes against any model (OpenAI, Anthropic, Gemini, Ollama, vLLM). Differentiates from
  Copilot by being model-agnostic and self-hostable, and from Cursor by living inside existing IDEs; YC-backed
  with ~$5M seed and ~33k GitHub stars.
version_note: Continue (continuedev/continue); VS Code extension v1.2.22 (Mar 2026), JetBrains plugin,
  and open-source `cn` CLI. Open-source AI code assistant — chat + inline edit + autocomplete in the IDE,
  now also marketing 'AI code agent' (agent mode) and CI checks. Verified live on GitHub + VS Marketplace
  June 2026.
