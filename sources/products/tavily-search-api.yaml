slug: tavily-search-api
name: Tavily Search API
org: tavily
type: software
description: Search API purpose-built for AI agents, returning clean, structured results optimized for
  LLM consumption rather than human browsing. Includes search, extract, crawl, and map endpoints. The
  default search provider in most agent tutorials and frameworks — integrated into LangChain, CrewAI,
  and AutoGen out of the box. YC-backed, rapidly growing as the canonical 'give your agent web search'
  solution.
version_note: 'Proprietary web-access API for agents: search, extract, crawl, map, research endpoints;
  Python/JS SDKs. PRECISION (verify 2026-06-04): Nebius announced an agreement to acquire Tavily on 10
  Feb 2026 for $275M (up to $400M on milestones), expected to close within weeks — an acquisition agreement,
  not necessarily a fully-closed deal at announcement. Verified live via docs.tavily.com + tavily.com
  June 2026.'
