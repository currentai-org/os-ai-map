slug: yi-1-5
name: Yi-1.5
org: 01-ai
type: model
description: Kai-Fu Lee's 01.AI foundation model family in 6B, 9B, and 34B variants, with continued pretraining
  on 500B tokens over Yi-1.0. Strong performance on Chinese and English benchmarks. Apache 2.0 licensed.
  One of the top Chinese-origin open-weights models, though increasingly competing with Qwen for mindshare
  in the Chinese open-source community.
version_note: Yi-1.5 base family (6B/9B/34B + 32K context variants), open-sourced 2024-05-13 by 01.AI.
  Continuously pre-trained on Yi with +500B tokens (3.6T total). Base SKUs (Yi-1.5-9B, Yi-1.5-34B) scored
  here; Yi-1.5-*-Chat are the instruct SKUs (finetuned_chat). Verified live on HF June 2026; a dated 2024-era
  generation vs 2026 frontier.
