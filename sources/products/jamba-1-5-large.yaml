name: jamba-1-5-large
display_name: Jamba 1.5 Large
type: model
description: 'AI21-Jamba-1.5-Large (ai21labs/AI21-Jamba-1.5-Large on HF), hybrid SSM-Transformer (Mamba+Attention)
  MoE, 398B total / 94B active, 256K context, instruction-tuned chat model with tool use / grounded-RAG
  / JSON mode. Announced 22 Aug 2024 under the Jamba Open Model License. Verified live on HF June 2026,
  but stale: superseded by Jamba 1.6 (Mar 2025) and the Jamba2/Jamba Reasoning 3B generation now headlined
  on ai21.com/jamba. Recategorized from base_pretrained -> finetuned_chat: this is the instruct/chat SKU
  (post-trained for downstream chat/agentic use), not a raw base model.'
