description: Previous-generation Gemini Pro tier (2025) with native multimodal understanding, 1M+ token
  context, and hybrid thinking mode. Superseded by Gemini 3 Pro and Gemini 3.1 Pro Preview, which leads
  LiveCodeBench Pro at 2887 Elo and posts 80.6% on SWE-bench Verified. Gemini 3.5 Pro is expected June
  2026. 2.5 Pro remains available via Google AI Studio and Vertex AI for cost-conscious workloads.
version_note: Google Gemini 2.5 Pro, first released as experimental preview Mar 25, 2025; thinking/reasoning
  instruct model, 1M-token context. Still actively listed on the Gemini API as 'most advanced for complex
  tasks' (not in the deprecated 'Previous models' list) as of June 2026, though superseded as flagship
  by Gemini 3/3.1/3.5. Proprietary API-only.
