name: claude-sonnet-4
display_name: Claude Sonnet 4
type: model
description: Previous-generation Sonnet tier (May 2025). Strong on SWE-bench Verified and agentic tool
  use with extended thinking mode and 200K context, but superseded by Sonnet 4.5 (2025-09-29) and Sonnet
  4.6 (2026-02-17), which is the current production default coding tier. Sonnet 4.7 was skipped per leaked
  Claude Code source; Sonnet 4.8 is the next planned tag.
comments: Anthropic Claude Sonnet 4, released May 22 2025 alongside Opus 4 (Claude 4 generation). Post-trained
  chat/agentic model, closed/API + Bedrock + Vertex + claude.ai (free tier). Superseded by Sonnet 4.5/4.6
  but the May-2025 SKU is the scored entity. Verified via Anthropic Claude 4 announcement June 2026.
