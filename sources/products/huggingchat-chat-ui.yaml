slug: huggingchat-chat-ui
name: HuggingChat / chat-ui
org: hugging-face
type: software
description: Open-source chat UI that powers HuggingChat (huggingface.co/chat), giving free public access
  to open-weights models like Llama, Mistral, Command R+ and others. Differentiator is being the reference
  SvelteKit chat UI shipped and maintained by Hugging Face itself, with first-class support for TGI/transformers
  endpoints; ~11k GitHub stars but powers a high-traffic free consumer endpoint.
version_note: chat-ui v0.10.0 (May 11, 2026), Apache-2.0, powers HuggingChat at hf.co/chat. Original HuggingChat
  was sunset July 1, 2025, then relaunched as 'HuggingChat Omni' (Omni Router + 115-123 open models, 15
  inference providers, MCP). Confirmed live June 2026.
