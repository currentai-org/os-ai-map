slug: smolagents
name: smolagents
org: hugging-face
type: software
description: Minimal code-first agent framework from Hugging Face (~1,000 lines of core code) whose headline
  CodeAgent writes actions as executable Python rather than JSON tool calls, which research shows uses
  ~30% fewer steps than traditional tool-calling agents on hard benchmarks. Differentiates through model-agnostic
  design (Hugging Face Inference, OpenAI, Anthropic, local transformers/llama.cpp) and first-class MCP
  support, making it the path of least resistance for HF users building agents. 27.5K GitHub stars, 203
  contributors, Apache-2.0; featured in Hugging Face's official agents course and referenced in Anthropic
  and Cohere agent-building guides.
version_note: smolagents by Hugging Face — minimal (~1k-LOC core) code-writing agent framework ('agents
  that think in code'). Apache-2.0. Verified live June 2026 on GitHub.
artifacts:
