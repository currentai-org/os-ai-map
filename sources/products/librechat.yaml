slug: librechat
name: LibreChat
org: librechat
type: software
description: Open-source ChatGPT clone with native support for OpenAI, Anthropic, Google, Mistral, and
  local model backends, plus multi-user auth, agents, code interpreter, and prompt sharing. Differentiator
  is enterprise-grade auth/RBAC and the closest faithful clone of ChatGPT's UX, making it popular for
  org-wide self-hosted deployments; ~37k GitHub stars by mid-2026.
version_note: Active 2026 (changelog/releases current); MIT-licensed self-hosted multi-provider chat UI.
  Acquired by ClickHouse in 2025. Confirmed live on GitHub June 2026.
artifacts:
  repos:
  - danny-avila/LibreChat
