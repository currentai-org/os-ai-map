name: gpt-5-line
display_name: GPT-5 line
org: openai
type: model
description: 'OpenAI''s current general-purpose flagship line spanning GPT-5 (August 2025), GPT-5.2, GPT-5.4,
  and GPT-5.5 (April 23, 2026), plus the GPT-5.5 Pro (API-only flagship), GPT-5.5 Instant (low-latency
  consumer tier), and GPT-5.3-Codex (the unified Codex+reasoning coder variant that succeeded o3/o4-mini).
  GPT-5.5 is marketed as OpenAI''s ''smartest, most agentic'' model; GPT-5.2 hits 80.0% on SWE-bench Verified
  and GPT-5.5 reportedly reaches 88.7% on a competing benchmark snapshot. GPT-5.5-high sits at #8 on the
  May 2026 LMArena text leaderboard (Elo 1481). Note: OpenAI has reportedly stopped reporting SWE-bench
  Verified scores, preferring SWE-bench Pro, citing test-case quality issues with Verified.'
version_note: 'OpenAI GPT-5 line: GPT-5 (Aug 7 2025, became ChatGPT default replacing GPT-4o) through
  GPT-5.1/5.2/5.4 and GPT-5.5 / GPT-5.5 Instant (the current ChatGPT default as of May 2026). Unified
  reasoning+chat post-trained model family, closed/API + ChatGPT only. Verified via OpenAI pages + Wikipedia
  + TechCrunch June 2026.'
