slug: phi-4-mini-instruct
name: Phi-4-mini-instruct
org: microsoft
type: model
description: Compact instruction-tuned small language model (3.8B) that punches well above its weight
  on coding benchmarks. Part of Microsoft's Phi-4 family, which expanded across 2025–early 2026 with Phi-4-reasoning,
  Phi-4-multimodal, and Phi-4-Reasoning-Vision-15B (March 2026); no Phi-5 has shipped as of May 2026.
  1.6M monthly downloads make Phi-4-mini one of the most popular small models for local coding.
version_note: Phi-4-mini-instruct, 3.8B dense, 128k context, 200k vocab, GQA; released Feb 2025 under
  MIT. SFT/DPO-aligned small instruct model. Verified live on HF June 2026.
